amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    base_frame_id: "chassis_link"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: scan

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: chassis_link
    odom_topic: /odom

controller_server:
  ros__parameters:

    use_sim_time: true
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.1
      yaw_goal_tolerance: 0.1
      stateful: True

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      max_linear_vel: 0.5
      min_linear_vel: -0.5
      max_angular_vel: 1.0
      min_angular_vel: -2.5
      max_linear_accel: 2.5
      max_linear_decel: -2.5
      max_angular_accel: 3.0
      max_angular_decel: -3.0
      
      # lookahead_dist: 0.6
      # min_lookahead_dist: 0.3
      # max_lookahead_dist: 0.9
      # make lookahead distance more but when reaching end of path, doesn't correct heading
      #lower angular vel and accel to get more smoother turns 

      lookahead_dist: 0.5  # Smaller for tighter tracking
      use_velocity_scaled_lookahead_dist: false 
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.8


      use_rotate_to_heading: True
      rotate_to_heading_min_angle: 0.3    # rotate in place if over 0.5
      rotate_to_heading_angular_vel: 0.4 # smoother end rotation

      lookahead_time: 1.5

      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6

      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0

      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.25

      use_cost_regulated_linear_velocity_scaling: false
      cost_scaling_dist: 0.3
      cost_scaling_gain: 1.0

      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      allow_reversing: false
      
      
      min_distance_to_obstacle: 0.0
      use_dynamic_window: true
      allow_obstacle_checking_beyond_goal: false

